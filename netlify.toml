[build]
  publish = "public"

[functions]
  directory = "functions"

# ─── API Redirects ────────────────────────────────────────
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/supabase"
  to = "/.netlify/functions/supabase-proxy"
  status = 200

[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/supabase-proxy"
  status = 200

[[redirects]]
  from = "/api/google-auth"
  to = "/.netlify/functions/google-auth"
  status = 200

# ─── /app/* → SPA fallback ────────────────────────────────
# app/ klasörü içindeki bilinmeyen route'ları app/index.html'e yönlendir
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# ─── Kök fallback (landing page) ──────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Vergi Takvimi — her gün 09:00 TSI (06:00 UTC) ────────
[functions."tax-reminder"]
  schedule = "0 6 * * *"

# ─── Saklama TTL Temizleyicisi — her gün 06:00 TSI (03:00 UTC) ────────
# 6 ay (180 gün) önce kaydedilmiş analizleri Storage'dan + DB'den siler.
# 7 gün önce uyarı e-postası gönderir; kullanıcı "Uzat" derse 180 gün daha saklanır.
# KVKK Madde 4 — veri minimizasyonu uyumluluğu.
[functions."retention-cleanup"]
  schedule = "0 3 * * *"
